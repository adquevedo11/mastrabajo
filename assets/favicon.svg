<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo azul navy con esquinas redondeadas -->
  <rect width="32" height="32" rx="6" fill="#1E3A8A"/>

  <!-- Documento trasero izquierdo (profundidad) -->
  <rect x="4" y="9" width="13" height="17" rx="2" fill="#2A4DB5" opacity="0.6"/>

  <!-- Documento trasero derecho -->
  <rect x="7" y="6" width="13" height="17" rx="2" fill="#3A5EC8" opacity="0.7"/>

  <!-- Documento frontal principal -->
  <rect x="11" y="3" width="14" height="18" rx="2" fill="white"/>

  <!-- Esquina doblada -->
  <path d="M22 3 L25 6 L22 6 Z" fill="#DBEAFE"/>
  <line x1="22" y1="3" x2="25" y2="6" stroke="#BFDBFE" stroke-width="0.5"/>

  <!-- Líneas de contenido (simula texto de cédula) -->
  <rect x="13" y="9"  width="8" height="1.5" rx="0.75" fill="#94A3B8"/>
  <rect x="13" y="12" width="5.5" height="1.5" rx="0.75" fill="#94A3B8"/>
  <rect x="13" y="15" width="7" height="1.5" rx="0.75" fill="#94A3B8"/>

  <!-- Círculo verde con checkmark -->
  <circle cx="24" cy="25" r="6.5" fill="#16A34A"/>
  <circle cx="24" cy="25" r="6.5" fill="none" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <polyline points="21.2,25.2 23.1,27.1 26.8,22.8"
            stroke="white" stroke-width="1.8"
            fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
